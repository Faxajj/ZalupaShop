<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mvideo Shop — запуск</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f6f8fc; margin: 0; color: #111827; }
    .box { max-width: 760px; margin: 48px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    code { background: #eef2f7; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Mvideo Shop</h1>
    <p>Если вы открыли этот файл напрямую, это <strong>не полноценный режим работы</strong>.</p>
    <p>Проект нужно запускать как Node.js сервер:</p>
    <ol>
      <li><code>npm install</code></li>
      <li><code>cp .env.example .env</code></li>
      <li><code>npm start</code></li>
      <li>Открыть <code>http://localhost:3000</code></li>
    </ol>
    <p>Пытаюсь открыть приложение автоматически...</p>
  
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'http://localhost:3000';
    }, 1200);
  </script>
</body>
</html>
